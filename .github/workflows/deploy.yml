name: Deploy Angular (GitHub Pages)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 14 (Angular 11)
        uses: actions/setup-node@v4
        with:
          node-version: "14"
          cache: "npm"
          cache-dependency-path: proyectoFinalAngular/package-lock.json

      - name: Install deps
        working-directory: proyectoFinalAngular
        run: npm install --legacy-peer-deps

      - name: Build Angular
        working-directory: proyectoFinalAngular
        run: npx ng build --configuration production --base-href "/Say_Tattoo-_ProyectoFullStack/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: proyectoFinalAngular/dist/proyectoFinalAngular

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

